name: Ingest events (manual)

# Manual / on-demand ingest. The scheduled 10-min cadence lives in pg_cron
# inside Supabase (migration 0003) — GitHub Actions' `schedule` trigger was
# flaky (delayed activation, throttling under load). Keep this workflow for
# hand-triggered reingest: Actions tab → Ingest events (manual) → Run workflow.

on:
  workflow_dispatch:

concurrency:
  group: ingest-events
  cancel-in-progress: false

jobs:
  ingest:
    name: Trigger ingest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call ingest-events
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "$SUPABASE_PROJECT_REF" ] || [ -z "$INGEST_SECRET" ]; then
            echo "Missing SUPABASE_PROJECT_REF or INGEST_SECRET secret" >&2
            exit 1
          fi
          URL="https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/ingest-events"
          echo "POST ${URL}"
          HTTP_STATUS=$(curl -sS -o /tmp/ingest.out -w '%{http_code}' \
            -X POST "$URL" \
            -H "x-ingest-secret: ${INGEST_SECRET}" \
            -H "content-type: application/json" \
            --data '{}')
          echo "HTTP $HTTP_STATUS"
          cat /tmp/ingest.out
          echo
          if [ "$HTTP_STATUS" -ge 300 ]; then
            exit 1
          fi
