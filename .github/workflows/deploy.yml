name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - claude/terrawatch-redesign-dMM0l
  workflow_dispatch:

concurrency:
  group: hostinger-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & deploy SPA
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      # Ensure SPA deep-links work on Hostinger's Apache (redirect unknown paths to index.html).
      - name: Emit .htaccess for SPA routing
        run: |
          cat > dist/.htaccess <<'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>

          <IfModule mod_mime.c>
            AddType application/manifest+json webmanifest
          </IfModule>

          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json image/svg+xml
          </IfModule>

          <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType image/svg+xml "access plus 1 month"
            ExpiresByType text/css "access plus 1 year"
            ExpiresByType application/javascript "access plus 1 year"
            ExpiresByType image/png "access plus 1 month"
            ExpiresByType font/woff2 "access plus 1 year"
          </IfModule>
          EOF

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ vars.HOSTINGER_FTP_PATH || '/public_html/' }}
          protocol: ${{ vars.HOSTINGER_FTP_PROTOCOL || 'ftps' }}
          port: ${{ vars.HOSTINGER_FTP_PORT || 21 }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
